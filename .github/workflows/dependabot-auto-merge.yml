---
name: Dependabot Auto-Merge

on:
  pull_request_target:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    outputs:
      update-type: ${{ steps.metadata.outputs.update-type }}
      ecosystem: ${{ steps.metadata.outputs.package-ecosystem }}
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn'
        run: npm ci

      - name: Check VS Code manifest versions
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn'
        run: npm run check:vscode-engine

      - name: Lint
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn'
        run: npm run lint

      - name: Build
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn'
        run: npm run build

      - name: Test
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn'
        run: npm test

      - name: Package VSIX
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn'
        run: npm run package

  auto-merge:
    needs: validate
    if: |
      github.actor == 'dependabot[bot]' &&
      (needs.validate.outputs.update-type == 'version-update:semver-minor' ||
       needs.validate.outputs.update-type == 'version-update:semver-patch')
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (squash)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
