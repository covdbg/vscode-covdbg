name: Release VSIX

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to validate against package.json, e.g. v0.3.0"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: release_tag
        env:
          INPUT_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "value=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches package version
        run: node ./scripts/verifyReleaseVersion.js "${{ steps.release_tag.outputs.value }}"

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Package VSIX
        run: npm run package

      - name: Publish to VS Code Marketplace
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT secret is not configured."
            echo "Create an Azure DevOps PAT with Marketplace (Manage) scope and add it as the VSCE_PAT GitHub Actions secret."
            exit 1
          fi

          VSIX_PATH="$(find . -maxdepth 1 -type f -name '*.vsix' | head -n 1)"

          if [ -z "$VSIX_PATH" ]; then
            echo "No VSIX file was produced by the packaging step."
            exit 1
          fi

          npx @vscode/vsce publish --packagePath "$VSIX_PATH" -p "$VSCE_PAT"

      - name: Generate SHA256 checksum
        run: sha256sum *.vsix > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          generate_release_notes: true
          files: |
            *.vsix
            SHA256SUMS.txt
